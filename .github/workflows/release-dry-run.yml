name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to validate against Cargo version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate input tag and Cargo version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify input tag matches superbook-pdf version
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          CARGO_VERSION=$(sed -n 's/^version = "\([^"]\+\)"/\1/p' superbook-pdf/Cargo.toml | head -n 1)
          EXPECTED_TAG="v${CARGO_VERSION}"

          echo "Input tag: ${TAG_NAME}"
          echo "Cargo.toml version: ${CARGO_VERSION}"

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "ERROR: Input tag (${TAG_NAME}) does not match Cargo version (${EXPECTED_TAG})."
            exit 1
          fi

  build:
    name: Dry-run build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate-tag
    defaults:
      run:
        working-directory: superbook-pdf
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_base: superbook-pdf-linux-x86_64
            bin_name: superbook-pdf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_base: superbook-pdf-windows-x86_64
            bin_name: superbook-pdf.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --features web --target ${{ matrix.target }}

      - name: Prepare artifact (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OUT_NAME="${{ matrix.asset_base }}-${{ github.event.inputs.tag_name }}"
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} "${OUT_NAME}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outName = "${{ matrix.asset_base }}-${{ github.event.inputs.tag_name }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" $outName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-${{ matrix.asset_base }}-${{ github.event.inputs.tag_name }}
          path: superbook-pdf/${{ matrix.asset_base }}-${{ github.event.inputs.tag_name }}*

  package-check:
    name: Dry-run package and checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Upload dry-run bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-bundle
          path: release/*

      - name: Support note
        run: |
          echo "Stable release validation targets Windows 11 + WSL2 + Docker Compose."
          echo "CPU-only and ROCm configurations are currently untested for stable releases."
