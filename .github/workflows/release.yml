name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate tag and Cargo version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches superbook-pdf version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Not a tag event. Skipping strict tag/version validation."
            exit 0
          fi

          TAG_NAME="${GITHUB_REF_NAME}"
          CARGO_VERSION=$(sed -n 's/^version = "\([^"]\+\)"/\1/p' superbook-pdf/Cargo.toml | head -n 1)
          EXPECTED_TAG="v${CARGO_VERSION}"

          echo "Tag: ${TAG_NAME}"
          echo "Cargo.toml version: ${CARGO_VERSION}"

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "ERROR: Tag (${TAG_NAME}) does not match Cargo version (${EXPECTED_TAG})."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate-tag
    defaults:
      run:
        working-directory: superbook-pdf
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_base: superbook-pdf-linux-x86_64
            bin_name: superbook-pdf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_base: superbook-pdf-windows-x86_64
            bin_name: superbook-pdf.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --features web --target ${{ matrix.target }}

      - name: Prepare artifact (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OUT_NAME="${{ matrix.asset_base }}-${GITHUB_REF_NAME}"
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} "${OUT_NAME}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outName = "${{ matrix.asset_base }}-${env:GITHUB_REF_NAME}.exe"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" $outName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_base }}-${{ github.ref_name }}
          path: superbook-pdf/${{ matrix.asset_base }}-${{ github.ref_name }}*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          append_body: true
          body: |
            ## Support note
            - Stable release validation targets Windows 11 + WSL2 + Docker Compose.
            - CPU-only (`docker-compose.cpu.yml`) and ROCm (`docker-compose.rocm.yml`) configurations are currently untested for stable releases.
