name: Feature Request
description: Propose a new feature or improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Note: Depending on project priorities and available resources, we may not be able to implement every request.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem are you trying to solve?
      placeholder: Describe the user problem first.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should it work?
      placeholder: Describe expected behavior and UX/CLI/API changes.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and Impact
      description: Which area is affected?
      placeholder: convert / markdown / api_server / docker / docs ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional alternatives or tradeoffs.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This request is not a duplicate of an existing issue.
          required: true
        - label: I described concrete use cases, not only implementation details.
          required: true
