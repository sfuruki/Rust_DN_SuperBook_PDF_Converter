changelog:
  exclude:
    labels:
      - skip-changelog
      - chore
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - perf
        - performance
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - ci
        - dependencies
        - refactor
    - title: Other Changes
      labels:
        - "*"
