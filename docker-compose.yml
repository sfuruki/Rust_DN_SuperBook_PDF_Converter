name: superbook-pdf

services:
  # =============================================================
  # 1. Frontend: Web UI (Nginx)
  # =============================================================
  frontend:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    image: superbook-frontend:latest
    container_name: superbook-web-ui
    restart: unless-stopped
    # 注: rust-core-stable が healthy になるまで待機 [構築方針]
    depends_on:
      rust-core-stable:
        condition: service_healthy
    ports:
      - "${SUPERBOOK_PORT:-8080}:80"
    networks:
      - superbook-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================
  # 2. Orchestrator: Rust Core
  # =============================================================
  rust-core-stable:
    build:
      context: ./superbook-pdf
      dockerfile: Dockerfile
    image: superbook-rust-core:latest
    container_name: superbook-rust-core
    restart: unless-stopped
    # 注: AIサービスが両方 healthy になるまで待機 [構築方針]
    depends_on:
      realesrgan-api:
        condition: service_healthy
      yomitoku-api:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - RUST_LOG=info
      - SUPERBOOK_WORK_DIR=/data/work
      - SUPERBOOK_OUTPUT_DIR=/data/output
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # マイクロサービス間の通信用URL [構築方針]
      - REALESRGAN_API_URL=http://realesrgan-api:8000
      - YOMITOKU_API_URL=http://yomitoku-api:8000
    volumes:
      - ./data/input:/data/input:ro
      - ./data/output:/data/output:rw
      - ./data/work:/data/work:rw
    networks:
      - superbook-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================
  # 3. AI Service: Upscale (RealESRGAN / Torch 2.0.1 / CUDA 11.8)
  # =============================================================
  # 注: 前に解決した方針に従い、Torch 2.0.1+cu118 を使用
  # YomiToku との環境分離により、ライブラリ衝突を回避 [構築方針]
  realesrgan-api:
    build:
      context: ./ai_services/realesrgan
    image: superbook-upscale:latest
    container_name: superbook-upscale
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - REALESRGAN_POOL_SIZE=0
    volumes:
      - ./data:/data:rw
      - ai-cache:/root/.cache
    networks:
      - superbook-net
    healthcheck:
      # /version エンドポイントでの互換性確認 [構築方針]
      test: ["CMD", "curl", "-f", "http://localhost:8000/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      # モデルロード時間を考慮（Torch 1.x + RealESRGAN で約60秒）
      start_period: 120s

  # =============================================================
  # 4. AI Service: OCR (YomiToku / Torch 2.x / CUDA 12.1)
  # =============================================================
  yomitoku-api:
    build:
      context: ./ai_services/yomitoku
    image: superbook-ocr:latest
    container_name: superbook-ocr
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./data:/data:rw
      - ai-cache:/root/.cache
    networks:
      - superbook-net
    healthcheck:
      # /version エンドポイントでの互換性確認 [構築方針]
      test: ["CMD", "curl", "-f", "http://localhost:8000/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      # モデルロード時間を考慮（Torch 2.x + YomiToku で約90秒）
      start_period: 120s

networks:
  superbook-net:
    driver: bridge

volumes:
  ai-cache:
    driver: local
    