name: superbook-pdf

services:
  # =============================================================
  # 1. Frontend: Web UI (Nginx)
  # =============================================================
  web-ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    image: superbook-frontend:latest
    container_name: superbook-web-ui
    restart: unless-stopped
    depends_on:
      rust-core:
        condition: service_healthy
    ports:
      - "${SUPERBOOK_PORT:-8080}:80"
    networks:
      - superbook-net

  # =============================================================
  # 2. Orchestrator: Rust Core
  # =============================================================
  rust-core:
    build:
      context: ./rust-core
      dockerfile: Dockerfile
    image: superbook-rust-core:latest
    container_name: superbook-rust-core
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - SUPERBOOK_WORK_DIR=/data/work
      # マイクロサービス間の通信用URL
      - UPSCALE_SERVICE_URL=http://upscale-service:8000
      - OCR_SERVICE_URL=http://ocr-service:8001
    volumes:
      - ./data/input:/data/input:ro
      - ./data/output:/data/output:rw
      - ./data/work:/data/work:rw
    networks:
      - superbook-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================
  # 3. AI Service: Upscale (RealESRGAN / Torch 1.x)
  # =============================================================
  upscale-service:
    build:
      context: ./ai_services/upscale
      dockerfile: Dockerfile
    image: superbook-upscale:latest
    container_name: superbook-upscale
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./data:/data:rw
      - ai-cache:/root/.cache
    networks:
      - superbook-net

  # =============================================================
  # 4. AI Service: OCR (YomiToku / Torch 2.x)
  # =============================================================
  ocr-service:
    build:
      context: ./ai_services/ocr
      dockerfile: Dockerfile
    image: superbook-ocr:latest
    container_name: superbook-ocr
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./data:/data:rw
      - ai-cache:/root/.cache
    networks:
      - superbook-net

networks:
  superbook-net:
    driver: bridge

volumes:
  ai-cache:
    driver: local
    